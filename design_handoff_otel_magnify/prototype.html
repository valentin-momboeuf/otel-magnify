<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>otel-magnify — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
/* ============ TOKENS ============ */
:root {
  --sans: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
  --mono: 'Fira Code', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
  --serif: 'Newsreader', Georgia, serif;
  --radius-sm: 4px; --radius: 6px; --radius-lg: 10px;
  --ease: cubic-bezier(.2,.7,.2,1);
  --dur-fast: 120ms; --dur: 180ms;
}
[data-theme="signal"], :root:not([data-theme]) {
  --bg:#0B0F14; --surface:#0F151C; --surface-2:#131B25; --surface-3:#1B2532;
  --border:#1E2A38; --border-hi:#2A3A4D;
  --text:#C5D0DD; --text-hi:#E8EEF6; --text-muted:#6E7D90; --text-dim:#4A5668;
  --accent:#6EE7FF; --accent-dim:rgba(110,231,255,.12); --accent-glow:rgba(110,231,255,.35); --accent-text:#0B0F14;
  --green:#34D399; --amber:#F0B429; --red:#F87171; --purple:#C084FC;
  --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 2px 10px rgba(0,0,0,.35); --shadow-lg:0 14px 40px rgba(0,0,0,.5);
  --font-body:var(--sans); --font-display:var(--sans);
  --grid-bg:radial-gradient(circle at 1px 1px, rgba(110,231,255,.04) 1px, transparent 0);
  --grid-size:24px 24px;
}
[data-theme="paper"] {
  --bg:#F5F2EC; --surface:#FBFAF6; --surface-2:#F0ECE3; --surface-3:#E5DFD3;
  --border:#DCD4C3; --border-hi:#B8AD96;
  --text:#2A2620; --text-hi:#100E0A; --text-muted:#6B6356; --text-dim:#9A907D;
  --accent:#B44A1A; --accent-dim:rgba(180,74,26,.08); --accent-glow:rgba(180,74,26,.25); --accent-text:#FBFAF6;
  --green:#2E7D4F; --amber:#A37300; --red:#B91C1C; --purple:#6B46A8;
  --shadow-sm:0 1px 0 rgba(0,0,0,.04); --shadow:0 1px 3px rgba(40,30,18,.10); --shadow-lg:0 12px 30px rgba(40,30,18,.12);
  --font-body:var(--sans); --font-display:var(--serif);
  --grid-bg:none; --grid-size:auto;
}
[data-theme="terminal"] {
  --bg:#0A0E0B; --surface:#0A0E0B; --surface-2:#0F1410; --surface-3:#141A15;
  --border:#1C2820; --border-hi:#2C3D2F;
  --text:#B8D4BC; --text-hi:#DAF0DD; --text-muted:#5D7762; --text-dim:#3A4D3E;
  --accent:#8AE66E; --accent-dim:rgba(138,230,110,.12); --accent-glow:rgba(138,230,110,.40); --accent-text:#0A0E0B;
  --green:#8AE66E; --amber:#E8C547; --red:#F47373; --purple:#B589E8;
  --shadow-sm:none; --shadow:none; --shadow-lg:0 0 40px rgba(138,230,110,.08);
  --font-body:var(--mono); --font-display:var(--mono);
  --grid-bg:repeating-linear-gradient(0deg,transparent,transparent 23px,rgba(138,230,110,.03) 23px,rgba(138,230,110,.03) 24px);
  --grid-size:auto;
}
:root[data-density="compact"] { --cell-py:.45rem; --pad:.75rem; }
:root[data-density="normal"]  { --cell-py:.7rem; --pad:1rem; }
:root[data-density="comfort"] { --cell-py:1rem; --pad:1.3rem; }
:root:not([data-density])     { --cell-py:.7rem; --pad:1rem; }

/* ============ BASE ============ */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; background-image: var(--grid-bg); background-size: var(--grid-size); }
code, pre { font-family: var(--mono); }
h1,h2,h3,h4 { font-family: var(--font-display); color: var(--text-hi); margin: 0; font-weight: 600; letter-spacing: -.01em; }
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; border: 0; background: none; cursor: pointer; color: inherit; }
input, select { font-family: inherit; color: inherit; }

.strip-top { position: fixed; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .5; z-index: 100; }

/* ============ LAYOUT ============ */
.app-layout { display: flex; min-height: 100vh; }
.sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 0 1rem; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 0 1.25rem 1.5rem; position: relative; }
.sidebar-logo-name { font-family: var(--font-display); font-weight: 700; font-size: 1.15rem; color: var(--text-hi); letter-spacing: -.02em; }
.sidebar-logo-name span { color: var(--accent); }
.sidebar-logo-sub { font-family: var(--mono); font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; }
.sidebar-signal { position: absolute; top: .45rem; right: 1.25rem; width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
[data-theme="paper"] .sidebar-signal { box-shadow: none; }
.sidebar-section-label { font-family: var(--mono); font-size: .65rem; letter-spacing: .15em; color: var(--text-dim); padding: .9rem 1.25rem .4rem; text-transform: uppercase; }
.sidebar-nav { list-style: none; margin: 0; padding: 0; }
.sidebar-nav-item { padding: 0 .6rem; }
.sidebar-nav-item a { display: flex; align-items: center; gap: .65rem; padding: .5rem .65rem; border-radius: var(--radius-sm); font-size: .87rem; color: var(--text); position: relative; transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease); }
.sidebar-nav-item a svg { flex-shrink: 0; opacity: .7; }
.sidebar-nav-item a:hover { background: var(--surface-2); color: var(--text-hi); }
.sidebar-nav-item a:hover svg { opacity: 1; }
.sidebar-nav-item a.active { background: var(--accent-dim); color: var(--accent); }
.sidebar-nav-item a.active svg { opacity: 1; }
.sidebar-nav-item a.active::before { content: ''; position: absolute; left: -.6rem; top: .4rem; bottom: .4rem; width: 2px; background: var(--accent); border-radius: 2px; }
.sidebar-badge { margin-left: auto; background: var(--red); color: #fff; font-family: var(--mono); font-size: .65rem; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
.sidebar-footer { margin-top: auto; padding: 1rem 1.25rem .25rem; font-family: var(--mono); font-size: .68rem; color: var(--text-muted); display: flex; align-items: center; gap: .4rem; border-top: 1px dashed var(--border); }
.sidebar-footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

.topbar { display: flex; align-items: center; gap: 1rem; padding: .85rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; }
.topbar-crumbs { font-family: var(--mono); font-size: .78rem; color: var(--text-muted); flex: 1; }
.crumb { color: var(--text-muted); cursor: pointer; }
.crumb:hover { color: var(--text-hi); }
.crumb-sep { margin: 0 .5rem; opacity: .4; }
.crumb-current { color: var(--text-hi); }
.tenant-pill { display: inline-flex; align-items: center; gap: .5rem; padding: .32rem .7rem .32rem .55rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 100px; font-size: .8rem; cursor: pointer; }
.tenant-pill:hover { border-color: var(--border-hi); }
.tenant-pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tenant-menu { position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); min-width: 240px; padding: .3rem; z-index: 30; animation: enter var(--dur) var(--ease); }
.tenant-menu-item { display: flex; align-items: center; gap: .55rem; padding: .45rem .6rem; border-radius: var(--radius-sm); font-size: .82rem; cursor: pointer; }
.tenant-menu-item:hover { background: var(--surface-2); }
.tenant-menu-item.active { background: var(--accent-dim); color: var(--accent); }
.tenant-menu-divider { height: 1px; background: var(--border); margin: .3rem 0; }
.user-chip { display: inline-flex; align-items: center; gap: .5rem; font-family: var(--mono); font-size: .78rem; }
.user-chip-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-dim); color: var(--accent); display: grid; place-items: center; font-size: .68rem; font-weight: 700; }

.main-content { padding: 1.75rem 2rem 3rem; max-width: 1400px; width: 100%; }
.page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
.page-title { font-size: 1.75rem; line-height: 1.1; font-weight: 700; letter-spacing: -.02em; }
[data-theme="paper"] .page-title { font-family: var(--serif); font-weight: 600; }
.page-subtitle { color: var(--text-muted); font-size: .9rem; margin-top: .35rem; }
.section-title { font-family: var(--mono); font-size: .72rem; letter-spacing: .12em; color: var(--text-muted); text-transform: uppercase; margin: 1.75rem 0 .7rem; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--pad); box-shadow: var(--shadow-sm); }
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .85rem; }
.panel-title { font-size: .95rem; font-weight: 600; color: var(--text-hi); }
.two-col { display: grid; grid-template-columns: 1.7fr 1fr; gap: 1.25rem; align-items: start; }
@media (max-width:1100px) { .two-col { grid-template-columns: 1fr; } }

.stat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: .85rem; }
@media (max-width:1100px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; position: relative; cursor: pointer; transition: border-color var(--dur-fast); }
.stat-card:hover { border-color: var(--border-hi); }
.stat-value { font-family: var(--mono); font-size: 1.75rem; color: var(--text-hi); line-height: 1; font-variant-numeric: tabular-nums; font-weight: 500; }
.stat-label { font-family: var(--mono); font-size: .68rem; letter-spacing: .1em; color: var(--text-muted); text-transform: uppercase; margin-top: .55rem; }
.stat-delta { position: absolute; top: .75rem; right: .85rem; font-family: var(--mono); font-size: .7rem; color: var(--green); }
.stat-delta.down { color: var(--red); }

.kv-row { display: flex; justify-content: space-between; gap: 1rem; padding: .5rem 0; border-bottom: 1px dashed var(--border); font-size: .85rem; }
.kv-row:last-child { border-bottom: 0; }
.kv-k { color: var(--text-muted); font-family: var(--mono); font-size: .78rem; }
.kv-v { color: var(--text-hi); font-family: var(--mono); font-size: .82rem; text-align: right; }

.data-table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; font-size: .85rem; }
.data-table th { text-align: left; padding: var(--cell-py) .9rem; font-family: var(--mono); font-size: .7rem; letter-spacing: .1em; color: var(--text-muted); text-transform: uppercase; background: var(--surface-2); border-bottom: 1px solid var(--border); font-weight: 500; }
.data-table td { padding: var(--cell-py) .9rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: 0; }
.data-table tbody tr { transition: background var(--dur-fast); }
.data-table tbody tr:hover { background: var(--surface-2); cursor: pointer; }
.data-table code { font-family: var(--mono); font-size: .78rem; color: var(--text); }

.badge { display: inline-flex; align-items: center; gap: .4rem; padding: .22rem .55rem; border-radius: 100px; font-family: var(--mono); font-size: .7rem; font-weight: 500; }
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }
[data-theme="paper"] .badge::before { box-shadow: none; }
.badge-connected { color: var(--green); background: rgba(52,211,153,.08); }
.badge-disconnected { color: var(--text-muted); background: var(--surface-2); }
.badge-degraded { color: var(--amber); background: rgba(240,180,41,.08); animation: pulse 2.5s infinite; }
.badge-critical { color: var(--red); background: rgba(248,113,113,.1); }

.sev { display: inline-flex; align-items: center; padding: .1rem .5rem; border-radius: 3px; font-family: var(--mono); font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.sev-critical { color: var(--red); background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3); }
.sev-warning { color: var(--amber); background: rgba(240,180,41,.12); border: 1px solid rgba(240,180,41,.3); }
.sev-info { color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-glow); }

.label-chip { display: inline-flex; align-items: center; padding: 1px 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 3px; font-family: var(--mono); font-size: .7rem; white-space: nowrap; }
.label-chip-key { color: var(--text-muted); }
.label-chip-eq { color: var(--text-dim); margin: 0 1px; }
.label-chip-val { color: var(--text-hi); }
.role-chip { display: inline-flex; padding: 1px 8px; border-radius: 3px; font-family: var(--mono); font-size: .7rem; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; border: 1px solid var(--border); }
.role-owner { color: var(--accent); border-color: var(--accent-glow); background: var(--accent-dim); }
.role-editor { color: var(--text-hi); border-color: var(--border-hi); }
.role-viewer { color: var(--text-muted); }

.btn { display: inline-flex; align-items: center; gap: .4rem; padding: .45rem .85rem; border: 1px solid var(--border-hi); background: var(--surface-2); color: var(--text-hi); border-radius: var(--radius-sm); font-size: .82rem; font-weight: 500; transition: all var(--dur-fast); }
.btn:hover { border-color: var(--accent-glow); color: var(--accent); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-sm { padding: .3rem .65rem; font-size: .75rem; }
.btn-primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
.btn-primary:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 0 20px var(--accent-glow); color: var(--accent-text); }
.btn-danger { background: transparent; border-color: rgba(248,113,113,.4); color: var(--red); }
.btn-danger:hover { background: rgba(248,113,113,.1); color: var(--red); }

.filter-bar { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.search-input { background: var(--surface-2); border: 1px solid var(--border); padding: .5rem .8rem; border-radius: var(--radius-sm); font-size: .85rem; min-width: 280px; color: var(--text-hi); flex: 1; max-width: 340px; }
.search-input:focus { outline: none; border-color: var(--accent); }
.filter-select { background: var(--surface-2); border: 1px solid var(--border); padding: .5rem .7rem; border-radius: var(--radius-sm); font-size: .8rem; font-family: var(--mono); color: var(--text); }

.agent-card { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .5rem; transition: all var(--dur-fast); cursor: pointer; gap: 1rem; }
.agent-card:hover { border-color: var(--border-hi); transform: translateX(2px); }
.agent-name { color: var(--text-hi); font-weight: 600; font-size: .92rem; }
.agent-meta { display: flex; align-items: center; gap: .6rem; color: var(--text-muted); font-family: var(--mono); font-size: .72rem; margin-top: 2px; }
.agent-type { text-transform: uppercase; letter-spacing: .08em; font-size: .65rem; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.agent-type-collector { background: var(--accent-dim); color: var(--accent); }
.agent-type-sdk { background: rgba(192,132,252,.14); color: var(--purple); }
.agent-supervised-pill { border: 1px solid var(--accent-glow); color: var(--accent); padding: 0 5px; border-radius: 3px; font-size: .62rem; text-transform: uppercase; letter-spacing: .06em; }

.detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .85rem; margin-bottom: 1.5rem; }
@media (max-width:900px) { .detail-grid { grid-template-columns: repeat(2, 1fr); } }
.detail-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem 1rem; }
.detail-cell-label { font-family: var(--mono); font-size: .62rem; letter-spacing: .12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: .3rem; }
.detail-cell-value { font-family: var(--mono); font-size: .92rem; color: var(--text-hi); font-weight: 500; }
.detail-cell-sub { display: block; font-size: .68rem; color: var(--text-muted); margin-top: 2px; font-weight: 400; }

.yaml-editor { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.yaml-editor pre { margin: 0; padding: .85rem 0; font-family: var(--mono); font-size: .78rem; line-height: 1.6; overflow-x: auto; }
.yaml-line { padding: 0 1rem 0 0; display: flex; }
.yaml-line:hover { background: var(--surface-2); }
.yaml-ln { display: inline-block; min-width: 3rem; padding: 0 .6rem; text-align: right; color: var(--text-dim); user-select: none; flex-shrink: 0; }
.yaml-k { color: var(--accent); }
.yaml-n { color: var(--amber); }
.yaml-s { color: var(--green); }
.yaml-c { color: var(--text-dim); font-style: italic; }
.diff-row { display: flex; padding: 0 1rem 0 0; }
.diff-row.add { background: rgba(52,211,153,.08); }
.diff-row.del { background: rgba(248,113,113,.08); }
.diff-sign { display: inline-block; min-width: 3rem; padding: 0 .6rem; text-align: right; color: var(--text-dim); user-select: none; flex-shrink: 0; }
.diff-row.add .diff-sign { color: var(--green); }
.diff-row.del .diff-sign { color: var(--red); }

.tabstrip { display: flex; border-bottom: 1px solid var(--border); margin-bottom: .75rem; gap: .25rem; }
.tab { padding: .55rem 1rem; font-size: .82rem; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab:hover { color: var(--text-hi); }
.tab-active { color: var(--accent); border-bottom-color: var(--accent); }

.canary-stage { display: grid; grid-template-columns: 1fr 2fr auto; gap: 1rem; align-items: center; padding: .75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .5rem; transition: all var(--dur); }
.canary-stage.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
.canary-stage.done { opacity: .6; border-color: var(--green); }
.canary-stage-label { font-size: .85rem; color: var(--text-hi); font-weight: 500; }
.canary-stage-progress { height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
.canary-stage-progress-fill { height: 100%; background: var(--accent); transition: width 1.2s var(--ease); }
.canary-stage.done .canary-stage-progress-fill { background: var(--green); }
.canary-stage-count { font-family: var(--mono); font-size: .78rem; color: var(--text-hi); min-width: 70px; text-align: right; }

.code-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .75rem 1rem; font-family: var(--mono); font-size: .78rem; color: var(--text-hi); overflow-x: auto; white-space: pre; position: relative; }
.code-block .prompt { color: var(--accent); user-select: none; margin-right: .4rem; }
.copy-btn { position: absolute; top: .4rem; right: .4rem; padding: .2rem .55rem !important; font-size: .68rem !important; background: var(--surface-2); opacity: .6; }
.copy-btn:hover { opacity: 1; }

.timeline { border-left: 2px solid var(--border); padding-left: 0; margin-left: .75rem; }
.timeline-item { position: relative; padding: .6rem 0 .6rem 1.25rem; }
.timeline-item::before { content: ''; position: absolute; left: -7px; top: 1rem; width: 12px; height: 12px; border-radius: 50%; background: var(--surface); border: 2px solid var(--border-hi); }
.timeline-item.green::before { border-color: var(--green); box-shadow: 0 0 8px rgba(52,211,153,.4); }
.timeline-item.red::before { border-color: var(--red); box-shadow: 0 0 8px rgba(248,113,113,.4); }
.timeline-time { font-family: var(--mono); font-size: .7rem; color: var(--text-muted); }
.timeline-title { font-size: .88rem; color: var(--text-hi); margin-top: 2px; }
.timeline-body { font-family: var(--mono); font-size: .78rem; color: var(--text); margin-top: 2px; }

.tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .85rem; margin-bottom: 1rem; }
.tenant-card { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); gap: 1rem; cursor: pointer; }
.tenant-card:hover { border-color: var(--border-hi); }

function Badge({ status, children }) { return <span className={`badge badge-${status}`}>{children || status}</span>; }
function Sev({ level }) { return <span className={`sev sev-${level}`}>{level}</span>; }
function LabelChip({ k, v }) { return <span className="label-chip"><span className="label-chip-key">{k}</span><span className="label-chip-eq">=</span><span className="label-chip-val">{v}</span></span>; }
function StatCard({ label, value, delta, onClick }) {
  return <div className="stat-card" onClick={onClick}>
    <div className="stat-value">{value}</div>
    <div className="stat-label">{label}</div>
    {delta && <div className={`stat-delta ${delta.startsWith('-')?'down':''}`}>{delta}</div>}
  </div>;
}
function highlightYaml(line) {
  let s = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/(#.*)$/, '<span class="yaml-c">$1</span>');
  s = s.replace(/^(\s*)([\w\-\.\/]+)(:)/, '$1<span class="yaml-k">$2</span>$3');
  s = s.replace(/:\s*(\d+[smhd]?)/g, ': <span class="yaml-n">$1</span>');
  s = s.replace(/:\s*(true|false|null)/g, ': <span class="yaml-n">$1</span>');
  s = s.replace(/(https?:\/\/[^\s]+)/g, '<span class="yaml-s">$1</span>');
  return s || '&nbsp;';
}
function YamlDisplay({ code }) {
  const lines = code.split('\n');
  return <div className="yaml-editor"><pre>{lines.map((ln, i) => (
    <div key={i} className="yaml-line">
      <span className="yaml-ln">{i+1}</span>
      <span dangerouslySetInnerHTML={{ __html: highlightYaml(ln) }} />
    </div>
  ))}</pre></div>;
}

function CanaryStage({ idx, label, stage, total }) {
  const active = stage === idx, done = stage > idx;
  const pct = done ? 100 : active ? 60 : 0;
  return (
    <div className={`canary-stage ${active?'active':''} ${done?'done':''}`}>
      <div className="canary-stage-label">{label}</div>
      <div className="canary-stage-progress"><div className="canary-stage-progress-fill" style={{ width: pct+'%' }} /></div>
      <div className="canary-stage-count">{done ? '✓ ' : ''}{done ? total : active ? Math.floor(total*0.6) : 0} / {total}</div>
    </div>
  );
}

      </div>
      <div className="stepper">
        <div className={`step ${step===1?'active':step>1?'done':''}`}><span className="step-n">1</span>{t('step1')}</div>
        <div className={`step ${step===2?'active':step>2?'done':''}`}><span className="step-n">2</span>{t('step2')}</div>
        <div className={`step ${step===3?'active':connected?'done':''}`}><span className="step-n">3</span>{t('step3')}</div>
      </div>
      {step === 1 && <div className="panel">
        <div className="panel-header"><div className="panel-title">{t('onb_h1')}</div></div>
        <div style={{ marginBottom:'.75rem', fontSize:'.82rem' }}>Linux amd64 · systemd · auto-register.</div>
        <div className="code-block"><button className="btn btn-sm copy-btn">copy</button><span className="prompt">$ </span>{installCmd}</div>
        <div style={{ display:'flex', justifyContent:'flex-end', marginTop:'1rem' }}>
          <button className="btn btn-primary" onClick={() => setStep(2)}>Next →</button>
        </div>
      </div>}
      {step === 2 && <div className="panel">
        <div className="panel-header"><div className="panel-title">{t('onb_h2')}</div></div>
        <div style={{ marginBottom:'.75rem', fontSize:'.82rem' }}>Le Supervisor OpAMP s'enregistrera auprès du control plane, négociera ses capabilities, puis récupérera la config assignée.</div>
        <div className="code-block"><button className="btn btn-sm copy-btn">copy</button><span className="prompt">$ </span>{runCmd}</div>
        <div style={{ marginTop:'.75rem', padding:'.65rem .8rem', background:'var(--accent-dim)', border:'1px solid var(--accent-glow)', borderRadius:'var(--radius-sm)', fontSize:'.8rem' }}>
          ⓘ Token d'enrôlement valide <b>24h</b>. Après la première connexion, le Supervisor utilise un certificat client OpAMP.
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:'1rem' }}>
          <button className="btn" onClick={() => setStep(1)}>← Back</button>
          <button className="btn btn-primary" onClick={() => setStep(3)}>Next →</button>
        </div>
      </div>}
      {step === 3 && <div className="panel">
        <div className="panel-header"><div className="panel-title">{t('onb_h3')}</div></div>
        {!connected ? (
          <div style={{ display:'flex', alignItems:'center', gap:'1rem', padding:'1.5rem 0' }}>
            <div style={{ width:44, height:44, borderRadius:'50%', border:'2px solid var(--accent)', borderTopColor:'transparent', animation:'rotate-slow 1s linear infinite' }} />
            <div>
              <div style={{ fontFamily:'var(--mono)', fontSize:'.92rem', color:'var(--text-hi)' }}>{t('onb_waiting')}{'.'.repeat(dotCount)}</div>
              <div style={{ fontFamily:'var(--mono)', fontSize:'.72rem', color:'var(--text-muted)', marginTop:4 }}>POST /v1/opamp · wss handshake · capabilities exchange</div>
            </div>
          </div>
        ) : (
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:'.75rem', color:'var(--green)', fontFamily:'var(--mono)', fontSize:'.92rem', marginBottom:'1rem' }}>✓ {t('onb_detected')}</div>
            <div className="agent-card" style={{ cursor:'default' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'.75rem' }}>
                <IconCollector />
                <div>
                  <div className="agent-name">new-collector-01</div>
                  <div className="agent-meta">
                    <span className="agent-type agent-type-collector">collector</span>
                    <span className="agent-supervised-pill">{t('supervised')}</span>
                    <span>v0.112.0</span>
                  </div>
                </div>
              </div>
              <Badge status="connected">connected</Badge>
            </div>
            <div style={{ display:'flex', justifyContent:'flex-end', marginTop:'1rem' }}>
              <button className="btn btn-primary" onClick={() => onGoto('inventory')}>{t('view_in_inventory')}</button>
            </div>
          </div>
        )}
      </div>}
    </div>
  );
}

/* ============ TWEAKS & APP ============ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "signal",
  "density": "normal",
  "lang": "fr",
  "tenantMode": "single"
}/*EDITMODE-END*/;

function Tweaks({ theme, setTheme, density, setDensity, lang, setLang, tenantMode, setTenantMode, visible }) {
  if (!visible) return null;
  const Opt = ({ value, current, onPick, label }) => (
    <button className={`tweaks-option ${value===current?'active':''}`} onClick={() => onPick(value)}>{label}</button>
  );
  return (
    <div className="tweaks">
      <div className="tweaks-head"><b>{t('tweaks_title')}</b><span>otel-magnify</span></div>
      <div className="tweaks-row">
        <div className="tweaks-label">{t('tweak_theme')}</div>
        <div className="tweaks-options">
          <Opt value="signal" current={theme} onPick={setTheme} label="Signal" />
          <Opt value="paper" current={theme} onPick={setTheme} label="Paper" />
          <Opt value="terminal" current={theme} onPick={setTheme} label="Terminal" />
        </div>
      </div>
      <div className="tweaks-row">
        <div className="tweaks-label">{t('tweak_density')}</div>
        <div className="tweaks-options">
          <Opt value="compact" current={density} onPick={setDensity} label={t('compact')} />
          <Opt value="normal" current={density} onPick={setDensity} label={t('normal')} />
          <Opt value="comfort" current={density} onPick={setDensity} label={t('comfort')} />
        </div>
      </div>
      <div className="tweaks-row">
        <div className="tweaks-label">{t('tweak_lang')}</div>
        <div className="tweaks-options">
          <Opt value="fr" current={lang} onPick={setLang} label="FR" />
          <Opt value="en" current={lang} onPick={setLang} label="EN" />
        </div>
      </div>
      <div className="tweaks-row">
        <div className="tweaks-label">{t('tweak_tenant_mode')}</div>
        <div className="tweaks-options">
          <Opt value="single" current={tenantMode} onPick={setTenantMode} label={t('single')} />
          <Opt value="multi" current={tenantMode} onPick={setTenantMode} label={t('multi')} />
        </div>
      </div>
    </div>
  );
}

function App() {
  const [current, setCurrent] = useState(() => localStorage.getItem('otm.screen') || 'dashboard');
  const [agent, setAgent] = useState(AGENTS[0]);
  const [theme, setTheme] = useState(localStorage.getItem('otm.theme') || TWEAK_DEFAULTS.theme);
  const [density, setDensity] = useState(localStorage.getItem('otm.density') || TWEAK_DEFAULTS.density);
  const [lang, setLang] = useState(localStorage.getItem('otm.lang') || TWEAK_DEFAULTS.lang);
  const [tenantMode, setTenantMode] = useState(localStorage.getItem('otm.tenantMode') || TWEAK_DEFAULTS.tenantMode);
  const [tenant, setTenant] = useState(TENANTS[0]);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [toast, setToast] = useState('');
  const persist = (edits) => { try { window.parent?.postMessage({ type:'__edit_mode_set_keys', edits }, '*'); } catch(e){} };
  useEffect(() => { localStorage.setItem('otm.screen', current); }, [current]);
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('otm.theme', theme); persist({ theme }); }, [theme]);
  useEffect(() => { document.documentElement.setAttribute('data-density', density); localStorage.setItem('otm.density', density); persist({ density }); }, [density]);
  useEffect(() => { window.__lang = lang; localStorage.setItem('otm.lang', lang); document.documentElement.lang = lang; persist({ lang }); }, [lang]);
  useEffect(() => { localStorage.setItem('otm.tenantMode', tenantMode); persist({ tenantMode }); }, [tenantMode]);
  useEffect(() => {
    const h = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent?.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 1800); };
  const onGoto = (id) => setCurrent(id);
  const crumbs = [
    { label:'otel-magnify', to:'dashboard' },
    ...(tenantMode === 'multi' ? [{ label:tenant.name, to:'dashboard' }] : []),
    { label:t('nav_' + (current === 'agent' ? 'inventory' : current === 'config' ? 'configs' : current)) || current },
    ...(current === 'agent' ? [{ label:agent.display_name }] : []),
    ...(current === 'config' ? [{ label:'edge-baseline-v2' }] : []),
  ];
  let page;
  switch (current) {
    case 'dashboard': page = <Dashboard onGoto={onGoto} setAgent={setAgent} tenant={tenant} />; break;
    case 'inventory': page = <Inventory onGoto={onGoto} setAgent={setAgent} />; break;
    case 'agent': page = <AgentDetail agent={agent} onGoto={onGoto} />; break;
    case 'configs':
    case 'config': page = <ConfigEditor onGoto={onGoto} showToast={showToast} />; break;
    case 'alerts': page = <AlertsScreen />; break;
    case 'audit': page = <AuditLog />; break;
    case 'tenants': page = <TenantsScreen />; break;
    case 'onboarding': page = <Onboarding onGoto={onGoto} />; break;
    case 'profile': page = <Profile theme={theme} setTheme={setTheme} density={density} setDensity={setDensity} lang={lang} setLang={setLang} tenantMode={tenantMode} setTenantMode={setTenantMode} showToast={showToast} />; break;
    default: page = <Dashboard onGoto={onGoto} setAgent={setAgent} tenant={tenant} />;
  }
  return (
    <>
      <div className="strip-top" />
      <div className="app-layout">
        <Sidebar current={current} setCurrent={onGoto} alertCount={ALERTS.length} tenantMode={tenantMode} />
        <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
          <Topbar crumbs={crumbs} tenantMode={tenantMode} tenant={tenant} setTenant={setTenant} onGoto={onGoto} />
          <main className="main-content" data-screen-label={current}>{page}</main>
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
      {tweaksOpen && <div className="toast" style={{ background:'var(--accent)', color:'var(--accent-text)', cursor:'pointer' }} onClick={() => onGoto('profile')}>{t('tweak_theme')} & {t('tweak_density')} → {t('nav_profile')} →</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
