name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 8 * * 1' # lundi 08:17 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd75a5cdde0acaa83ee3e51eada3b6b4615e3a8a # v3.27.7
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@dd75a5cdde0acaa83ee3e51eada3b6b4615e3a8a # v3.27.7
      - name: Analyze
        uses: github/codeql-action/analyze@dd75a5cdde0acaa83ee3e51eada3b6b4615e3a8a # v3.27.7
        with:
          category: "/language:${{ matrix.language }}"
