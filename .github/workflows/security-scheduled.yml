name: security-scheduled

on:
  schedule:
    - cron: '0 6 * * 1' # lundi 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  trivy-image-deep:
    name: trivy deep image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run trivy on latest published image
        id: trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: 'ghcr.io/magnify-labs/otel-magnify:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          ignore-unfixed: true
          output: trivy-summary.txt
        continue-on-error: true # the image may not exist before the first release; don't fail the schedule

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: trivy-summary
          path: trivy-summary.txt
          if-no-files-found: ignore

      - name: Open or refresh weekly issue
        if: always()
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: '🔒 Weekly security report — week ${{ github.run_id }}'
          content-filepath: trivy-summary.txt
          labels: security, automated
          assignees: valentin-momboeuf
