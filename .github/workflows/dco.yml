name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify Signed-off-by on PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r sha; do
            if ! git log -1 --format=%B "${sha}" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit ${sha} is missing a Signed-off-by line."
              git log -1 --format='  subject: %s%n  author:  %an <%ae>' "${sha}"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          if [ "${missing}" -gt 0 ]; then
            echo "::error::${missing} commit(s) missing DCO sign-off. Use 'git commit --signoff' or 'git rebase --signoff'."
            exit 1
          fi
          echo "All commits are signed off."
