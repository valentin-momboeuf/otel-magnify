# Sample collector config for otel-magnify.
# The resourcedetection + resource processors below populate the attributes
# otel-magnify uses to fingerprint this collector as a workload (cluster +
# namespace + workload kind + name in K8s, or service.name + host.name on
# bare metal).
extensions:
  opamp:
    server:
      ws:
        endpoint: ws://otel-magnify:4320/v1/opamp
        tls:
          insecure: true

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  # Populate workload identity attributes for otel-magnify fingerprinting.
  # Uncomment the k8s detector when deployed inside a Kubernetes pod;
  # the resource processor keeps service-level identity.
  resourcedetection:
    detectors: [env]
    # detectors: [env, k8s]
    timeout: 2s
  resource:
    attributes:
      - key: k8s.cluster.name
        from_attribute: OTEL_K8S_CLUSTER_NAME
        action: insert

exporters:
  debug:
    verbosity: basic

service:
  extensions: [opamp]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [debug]
