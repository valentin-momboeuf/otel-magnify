site_name: otel-magnify
site_description: Centralized OpenTelemetry agent management via OpAMP
site_url: https://magnify-labs.github.io/otel-magnify/
repo_url: https://github.com/magnify-labs/otel-magnify
repo_name: magnify-labs/otel-magnify
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - include-markdown

nav:
  - Home: index.md
  - Users:
      - Overview: users/index.md
      - Installation: users/installation.md
      - Configuration: users/configuration.md
      - Connecting agents: users/connecting-agents.md
      - Managing configs: users/managing-configs.md
      - Alerts: users/alerts.md
      - Troubleshooting: users/troubleshooting.md
  - Developers:
      - Overview: developers/index.md
      - Architecture: developers/architecture.md
      - Backend: developers/backend.md
      - Frontend: developers/frontend.md
      - OpAMP flow: developers/opamp-flow.md
      - Testing: developers/testing.md
      - Release: developers/release.md
  - API:
      - Overview: api/index.md
      - Authentication: api/authentication.md
      - REST: api/rest.md
      - WebSocket: api/websocket.md
      - OpAMP: api/opamp.md
  - Reference:
      - Environment variables: reference/environment.md
      - Glossary: reference/glossary.md
      - Changelog: reference/changelog.md
