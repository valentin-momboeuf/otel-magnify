version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
    - gocritic
    - bodyclose
    - sqlclosecheck
    - errorlint
    - copyloopvar
    - exhaustive
  exclusions:
    paths:
      # Vendored Go file shipped by the npm "flatted" package — not our code.
      - frontend/node_modules
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: internal/store/migrations/
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
